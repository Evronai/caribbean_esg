        { title:"Draft Renewable Energy Policy", category:"Policy", location:"National", description:"Developed with UNDP technical support via GCCA+; includes Feed‑in Tariff policy.", impact:"Draft Complete" },
        { title:"National Adaptation Plan Implementation", category:"Policy", location:"National", description:"Climate considerations integrated into national planning.", impact:"Ongoing" },

        { title:"Green Hydrogen Exploration", category:"Emerging Tech", location:"National", description:"Government exploring cleaner energy sources including green hydrogen.", impact:"Exploratory" },

    // ---------- 40 RESEARCH GAP PROJECTS ----------
    const gapProjects = [
        ...Array.from({ length: 15 }, (_, i) => ({ title:`Corporate ESG Initiative #${i+1}`, category:"Research Gap: Corporate ESG", location:"Various companies", description:"Undocumented corporate sustainability program. Needs primary research.", impact:"Interview sustainability officers" })),
        ...Array.from({ length: 10 }, (_, i) => ({ title:`Smallholder Climate‑Smart Adopter #${i+1}`, category:"Research Gap: Sustainable Agriculture", location:"Brasso Seco, Matura, Mayaro...", description:"FAO project mentions multiple adopters; details not public.", impact:"Field surveys required" })),
        ...Array.from({ length: 5 }, (_, i) => ({ title:`Community Recycling Group #${i+1}`, category:"Research Gap: Waste Management", location:"Undocumented", description:"Potential replication of Cashew Gardens model; existence unknown.", impact:"Grassroots mapping" })),
        ...Array.from({ length: 5 }, (_, i) => ({ title:`School Climate Action Program #${i+1}`, category:"Research Gap: Education", location:"Various schools", description:"Schools likely have gardening, recycling, or climate clubs – not documented.", impact:"Survey schools" })),
        ...Array.from({ length: 3 }, (_, i) => ({ title:`Carbon Offset Pilot #${i+1}`, category:"Research Gap: Carbon Offsets", location:"TBD", description:"Government mentions carbon market exploration; pilots may have emerged.", impact:"Track announcements" })),
        ...Array.from({ length: 2 }, (_, i) => ({ title:`Undocumented Tobago Initiative #${i+1}`, category:"Research Gap: Tobago", location:"Tobago", description:"Only three Tobago projects are listed; many more likely exist.", impact:"Collaborate with THA" }))
    ];

    const allProjects = [...realProjects, ...gapProjects].map((p, idx) => ({ ...p, id: idx + 1 }));

    // ---------- UI state ----------
    let activeCategory = 'All';
    let searchTerm = '';

    const categories = ['All', ...new Set(allProjects.map(p => p.category))];

    const filterContainer = document.getElementById('categoryFilters');
    function renderFilterButtons() {
        filterContainer.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${cat === activeCategory ? 'active' : ''}`;
            btn.dataset.category = cat;
            btn.textContent = cat;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = cat;
                filterProjects();
            });
            filterContainer.appendChild(btn);
        });
    }

    const grid = document.getElementById('projectsGrid');
    const projectCountSpan = document.getElementById('projectCount');

    function filterProjects() {
        const term = searchTerm.toLowerCase().trim();
        const filtered = allProjects.filter(p => {
            if (activeCategory !== 'All' && p.category !== activeCategory) return false;
            if (term === '') return true;
            return p.title.toLowerCase().includes(term) ||
                   p.description.toLowerCase().includes(term) ||
                   p.location.toLowerCase().includes(term) ||
                   p.category.toLowerCase().includes(term);
        });

        projectCountSpan.textContent = filtered.length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-projects">🌧️ no projects match — refine your criteria</div>`;
            return;
        }

        let htmlStr = '';
        filtered.forEach(p => {
            const isGap = p.category.includes('Research Gap');
            const gapClass = isGap ? 'gap' : '';
            htmlStr += `
                <div class="project-card ${gapClass}">
                    <span class="card-category">${p.category}</span>
                    <div class="card-title">${p.title}</div>
                    <div class="card-location">${p.location}</div>
                    <div class="card-description">${p.description}</div>
                    <div class="card-impact">${p.impact}</div>
                </div>
            `;
        });
        grid.innerHTML = htmlStr;
    }

    // Search
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    searchBtn.addEventListener('click', () => { searchTerm = searchInput.value; filterProjects(); });
    searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') { searchTerm = searchInput.value; filterProjects(); } });
    searchInput.addEventListener('input', () => {
        clearTimeout(window.debTimer);
        window.debTimer = setTimeout(() => { searchTerm = searchInput.value; filterProjects(); }, 200);
    });

    renderFilterButtons();
    filterProjects();
})();
</script>
</body>
</html>
